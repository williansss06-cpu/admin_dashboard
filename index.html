<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Frete Inteligente - Dashboard</title>

<style>
body { font-family: Arial; margin:0; background:#f4f6f8; }
.container { max-width:1400px; margin:auto; padding:20px; }

.topbar {
  display:flex; justify-content:space-between; align-items:center;
}

.btn { background:#0f766e;color:#fff;border:none;padding:10px 14px;border-radius:8px;cursor:pointer }

.stat { background:#fff;padding:20px;border-radius:12px }
.stats { display:grid;grid-template-columns:repeat(4,1fr);gap:10px }

.card { background:#fff;padding:20px;border-radius:12px;margin-top:20px }

.aba { padding:10px;background:#eee;border-radius:8px;cursor:pointer }
.ativa { background:#0f766e;color:#fff }
</style>
</head>

<body>

<div class="container">

<div class="topbar">
  <h2>📊 Dashboard Plataforma</h2>
  <button class="btn" onclick="logout()">Sair</button>
</div>

<div class="stats">
  <div class="stat">Empresas: <b id="stat_empresas">0</b></div>
  <div class="stat">Usuários: <b id="stat_usuarios">0</b></div>
  <div class="stat">Rotas: <b id="stat_rotas">0</b></div>
  <div class="stat">Saving: <b id="stat_saving">0</b></div>
</div>

<div style="margin-top:20px">
  <span class="aba ativa" onclick="mostrarAba('empresas')">Empresas</span>
  <span class="aba" onclick="mostrarAba('pendentes')">Pendentes</span>
  <span class="aba" onclick="mostrarAba('usuarios')">Usuários</span>
</div>

<div id="conteudo"></div>

</div>

<!-- Firebase (APENAS UMA VEZ) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA6YNz6vagSyIJumrKeY1Ptr_6rTpMMZ_A",
  authDomain: "rota-22c3b.firebaseapp.com",
  databaseURL: "https://rota-22c3b-default-rtdb.firebaseio.com",
  projectId: "rota-22c3b"
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}

const db = firebase.database();
</script>

<script>

// 🔒 VALIDAÇÃO MELHORADA
(function validarAcesso() {
  const usuarioId = localStorage.getItem("usuario_id");
  const perfil = localStorage.getItem("perfil");

  if (!usuarioId) {
    alert("Sessão expirada");
    window.location.href = "./Login/index.html";
    return;
  }

  if (perfil !== "admin_plataforma") {
    alert("Acesso restrito");
    window.location.href = "./index.html";
    return;
  }
})();

// 🚪 LOGOUT
function logout() {
  localStorage.clear();
  window.location.href = "./Login/index.html";
}

// 📊 DASHBOARD
async function carregarDashboard() {
  try {
    const emp = await db.ref("empresas").once("value");
    const usu = await db.ref("usuarios").once("value");
    const rot = await db.ref("rotas").once("value");

    document.getElementById("stat_empresas").innerText = emp.numChildren();
    document.getElementById("stat_usuarios").innerText = usu.numChildren();
    document.getElementById("stat_rotas").innerText = rot.numChildren();

    const saving = (rot.numChildren() * 150).toFixed(2);
    document.getElementById("stat_saving").innerText = "R$ " + saving;

  } catch(e) {
    console.error("Erro dashboard:", e);
  }
}

// 📂 ABAS
function mostrarAba(tipo) {

  document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
  event.target.classList.add('ativa');

  if (tipo === 'empresas') carregarEmpresas();
  if (tipo === 'pendentes') carregarPendentes();
  if (tipo === 'usuarios') carregarUsuarios();
}

// 🏢 EMPRESAS
async function carregarEmpresas() {
  const snap = await db.ref("empresas").once("value");
  let html = "<div class='card'><h3>Empresas</h3>";

  snap.forEach(c => {
    const e = c.val();
    html += `<p>${e.nome_fantasia} - ${e.cnpj}</p>`;
  });

  html += "</div>";
  document.getElementById("conteudo").innerHTML = html;
}

// ⏳ PENDENTES
async function carregarPendentes() {
  const snap = await db.ref("usuarios").orderByChild("status").equalTo("pendente").once("value");
  let html = "<div class='card'><h3>Pendentes</h3>";

  snap.forEach(c => {
    const u = c.val();
    html += `<p>${u.nome} - ${u.email}</p>`;
  });

  html += "</div>";
  document.getElementById("conteudo").innerHTML = html;
}

// 👥 USUÁRIOS
async function carregarUsuarios() {
  const snap = await db.ref("usuarios").once("value");
  let html = "<div class='card'><h3>Usuários</h3>";

  snap.forEach(c => {
    const u = c.val();
    html += `<p>${u.nome} - ${u.email}</p>`;
  });

  html += "</div>";
  document.getElementById("conteudo").innerHTML = html;
}

// 🚀 INIT
carregarDashboard();
carregarEmpresas();

</script>

</body>
</html>
